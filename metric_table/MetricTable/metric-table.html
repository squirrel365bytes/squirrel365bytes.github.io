<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metric Table Viz Extension</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="title">Metric Table</div>
      <div class="spacer"></div>
      <button id="btnConfigure" class="btn">Format…</button>
    </header>

    <div id="status" class="status"></div>

    <div class="table-wrap" id="tableWrap">
      <table class="metric-table" id="metricTable" aria-label="Metric Table"></table>
    </div>
  </div>

  <!-- Tableau Extensions API (latest) -->
  <script src="https://cdn.jsdelivr.net/npm/@tableau/extensions-api@1.15.0/dist/tableau.extensions.1.latest.js"></script>
  <script src="./app.js"></script>
</body>
</html>
